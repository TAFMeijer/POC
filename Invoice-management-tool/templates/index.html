<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Invoice Management Tool — Generate invoices from Google Calendar appointments">
    <title>Facturation — Invoice Management</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Handsontable -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable@14.6.1/dist/handsontable.full.min.css">
    <script src="https://cdn.jsdelivr.net/npm/handsontable@14.6.1/dist/handsontable.full.min.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-group">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                    </div>
                    <h1>Facturation</h1>
                </div>
                <span class="header-subtitle">Gestion des factures</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Controls Card -->
            <section class="card controls-card" id="controls-section">
                <h2 class="card-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    Recherche de rendez-vous
                </h2>

                <div class="controls-grid">
                    <div class="form-group">
                        <label for="client-select">Client</label>
                        <select id="client-select">
                            <option value="">— Sélectionner un client —</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="start-date">Date de début</label>
                        <input type="date" id="start-date">
                    </div>

                    <div class="form-group">
                        <label for="end-date">Date de fin</label>
                        <input type="date" id="end-date">
                    </div>

                    <div class="form-group form-group-btn">
                        <button id="fetch-btn" class="btn btn-primary" disabled>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                            Rechercher
                        </button>
                    </div>
                </div>

                <!-- Status message -->
                <div id="status-message" class="status-message hidden"></div>
            </section>

            <!-- Appointments Table Card -->
            <section class="card table-card hidden" id="table-section">
                <div class="card-header-row">
                    <h2 class="card-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 20h9"/>
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                        </svg>
                        Rendez-vous — <span id="table-client-name"></span>
                    </h2>
                    <div class="table-info">
                        <span id="row-count" class="badge">0 lignes</span>
                    </div>
                </div>

                <div id="appointments-table"></div>

                <!-- Total row -->
                <div class="total-row">
                    <span class="total-label">TOTAL À FACTURER</span>
                    <span class="total-amount" id="total-amount">€ 0.00</span>
                </div>

                <!-- Generate button -->
                <div class="action-row">
                    <button id="open-tracker-btn" class="btn" style="margin-right: auto; background: var(--bg-card); color: var(--accent); border: 1px solid var(--accent-glow);">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        Ouvrir le suivi Excel
                    </button>
                    <button id="generate-correction-btn" class="btn hidden" style="margin-right: 12px; background: #c88135; color: #1a1400;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        Corriger (Même N°)
                    </button>
                    <button id="generate-btn" class="btn btn-success">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="12" y1="18" x2="12" y2="12"/>
                            <polyline points="9 15 12 12 15 15"/>
                        </svg>
                        Générer (Nouveau N°)
                    </button>
                </div>
            </section>

            <!-- Download Card (shown after generation) -->
            <section class="card download-card hidden" id="download-section">
                <div class="download-content">
                    <div class="download-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                    </div>
                    <h3>Facture générée avec succès!</h3>
                    <p id="download-filename"></p>
                    <a id="download-link" class="btn btn-download" href="#" download>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Télécharger la facture
                    </a>
                </div>
            </section>
        </main>
    </div>

    <!-- App logic -->
    <script src="/static/js/app.js"></script>
</body>
</html>
